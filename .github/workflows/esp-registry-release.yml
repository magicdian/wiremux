name: Publish ESP Registry Components

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      ESP_REGISTRY_NAMESPACE: magicdian
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate release source
        shell: bash
        run: |
          set -euo pipefail

          version="$(tr -d '[:space:]' < VERSION)"
          tag_version="${GITHUB_REF_NAME#v}"

          if [ "${tag_version}" != "${version}" ]; then
            echo "Release tag ${GITHUB_REF_NAME} does not match VERSION ${version}" >&2
            exit 1
          fi

          git fetch origin main --no-tags
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" origin/main; then
            echo "Release commit ${GITHUB_SHA} is not contained in origin/main" >&2
            exit 1
          fi

      - name: Install host validation dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y pkg-config libudev-dev

      - name: Validate host-side checks
        shell: bash
        run: |
          set -euo pipefail
          echo "PATH=${PATH}"
          command -v cc
          command -v as
          cc --version
          as --version
          tools/wiremux-build check core
          tools/wiremux-build check host

      - name: Install ESP-IDF
        uses: espressif/install-esp-idf-action@v1
        with:
          version: v5.4.1

      - name: Validate ESP vendor build and generate packages
        shell: bash
        env:
          WIREMUX_ESP_REGISTRY_NAMESPACE: ${{ env.ESP_REGISTRY_NAMESPACE }}
        run: |
          set -euo pipefail
          tools/wiremux-build doctor
          tools/wiremux-build check vendor-espressif
          tools/wiremux-build package esp-registry

      - name: Upload ESP Registry package artifact
        uses: actions/upload-artifact@v4
        with:
          name: esp-registry-packages
          path: dist/esp-registry
          if-no-files-found: error
          retention-days: 7

  publish:
    needs: validate
    runs-on: ubuntu-latest
    env:
      ESP_REGISTRY_NAMESPACE: magicdian
    strategy:
      fail-fast: false
      matrix:
        component:
          - wiremux-core
          - esp-wiremux
    steps:
      - name: Download ESP Registry package artifact
        uses: actions/download-artifact@v4
        with:
          name: esp-registry-packages
          path: dist/esp-registry

      - name: Upload component
        uses: espressif/upload-components-ci-action@v2
        with:
          namespace: ${{ env.ESP_REGISTRY_NAMESPACE }}
          components: ${{ matrix.component }}:dist/esp-registry/${{ matrix.component }}
